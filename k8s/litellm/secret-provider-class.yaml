apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: litellm-db-url
  namespace: rag-platform
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "rag-platform-litellm-db-url"
        objectType: "secretsmanager"
        objectAlias: "DATABASE_URL"
  # Sync to a k8s Secret so extraEnvVars.DATABASE_URL can reference it via secretKeyRef.
  # Requires syncSecret.enabled=true on the CSI driver (set in terraform/addons/main.tf).
  secretObjects:
    - secretName: litellm-db-url-sync
      type: Opaque
      data:
        - objectName: DATABASE_URL
          key: DATABASE_URL
