replicaCount: 1

# Disable the bundled Bitnami PostgreSQL subchart — we use RDS via DATABASE_URL env var.
db:
  deployStandalone: false

# Disable the chart's Prisma migration Job — provision.py runs it directly with the
# full DATABASE_URL (which may contain special chars that break the chart's URL template).
migrationJob:
  disableSchemaUpdate: true

# Disable the bundled Bitnami Redis subchart — we use ElastiCache via REDIS_URL env var.
redis:
  enabled: false

# Use our pre-created litellm-env Secret for PROXY_MASTER_KEY (preserves it across upgrades).
masterkeySecretName: litellm-env
masterkeySecretKey: PROXY_MASTER_KEY

image:
  repository: ghcr.io/berriai/litellm-database
  tag: "main-v1.82.3"
  pullPolicy: IfNotPresent

nameOverride: "litellm"

serviceAccount:
  create: true
  name: litellm

service:
  type: ClusterIP
  port: 4000

extraEnvVars: {}

# ── LiteLLM proxy configuration ───────────────────────────────────────────────
proxy_config:
  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    database_url: os.environ/DATABASE_URL

  model_list:
    # Primary: Bedrock Claude Sonnet 4.5 via ap-southeast-2 inference profile
    - model_name: claude-sonnet
      litellm_params:
        model: bedrock/au.anthropic.claude-sonnet-4-5-20250929-v1:0
        aws_region_name: ap-southeast-2

    # Fallback: vLLM Llama 3.1 8B (in-cluster)
    - model_name: llama-3-1-8b
      litellm_params:
        model: openai/meta-llama/Meta-Llama-3.1-8B-Instruct
        api_base: http://vllm.rag-platform.svc.cluster.local:8000/v1
        api_key: none

  router_settings:
    # Bedrock primary → vLLM fallback on backend 5xx/timeout.
    # BudgetExceededError is an internal LiteLLM error — never reaches this chain.
    model_group_alias:
      default-model: claude-sonnet

    fallbacks:
      - claude-sonnet:
          - llama-3-1-8b

  litellm_settings:
    cache: true
    cache_params:
      type: redis
      url: os.environ/REDIS_URL

# ── Environment variables ─────────────────────────────────────────────────────
# Each entry is a k8s Secret name; all keys in that Secret become env vars.
# litellm-db-url-sync is created and kept current by provision.py (bootstrap_k8s_secrets).
# litellm-env holds PROXY_MASTER_KEY and REDIS_URL — preserved across re-runs.
environmentSecrets:
  - litellm-db-url-sync
  - litellm-env

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

startupProbe:
  path: /health/readiness
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 60
